<div class="table-container">
  <table class="data-table">
    <thead>
      <tr>
        <th *ngFor="let column of columns">{{ column }}</th>
        <th *ngIf="showActions && showAllActions">Ações</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let item of paginatedData">
        <td *ngFor="let column of columns" [attr.data-label]="column">
          {{ truncateText(column, item) }}
        </td>

        <td
          *ngIf="showActions && showAllActions"
          class="actions-cell"
          data-label="Ações"
        >
          <div class="actions-container" [class.actions-container-relatorios]="showOpcoes">
            <button
              *ngIf="showBaixarContrato"
              class="action-button success"
              (click)="emitDownloadContract(item)"
              title="Baixar contrato"
            >
              <i class="bi bi-download"></i>
            </button>

            <button
              *ngIf="showRenew"
              class="action-button neutral"
              (click)="emitRenewContractId(item)"
              title="Renovar contrato"
            >
              <i class="bi bi-arrow-repeat"></i>
            </button>

            <button class="action-button warning" (click)="onEdit(item)" title="Editar">
              <i class="bi bi-pencil-fill"></i>
            </button>

            <button
              *ngIf="showDelete"
              class="action-button danger"
              (click)="onDelete(item)"
              title="Excluir"
            >
              <i class="bi bi-trash-fill"></i>
            </button>

            <button
              *ngIf="showBoleto"
              class="action-button info"
              (click)="emitGenerateBoleto(item)"
              title="Gerar boleto"
            >
              <i class="bi bi-receipt"></i>
            </button>

            <button
              *ngIf="showComprovante"
              class="action-button success"
              (click)="emitDownloadComprovante(item)"
              title="Baixar comprovante"
            >
              <i class="bi bi-file-earmark-arrow-down"></i>
            </button>

            <div *ngIf="showOpcoes" class="dropdown">
              <button
                title="Cartas do processo"
                class="action-button neutral"
                (click)="toggleDropdown(getItemId(item))"
              >
                <i class="bi bi-envelope-paper-heart"></i>
              </button>

              <div class="dropdown-content" [ngClass]="{ show: dropdownOpen === getItemId(item) }">
                <a class="it" (click)="gerarCartas2(getItemId(item), 'pericia-medica')">
                  Carta de Perícia Médica
                </a>
                <a class="it" (click)="gerarCartas2(getItemId(item), 'avaliacao-social')">
                  Carta de Avaliação Social
                </a>
                <a class="it" (click)="gerarCartas2(getItemId(item), 'concessao')">
                  Carta de Concessão
                </a>
              </div>
            </div>
          </div>
        </td>
      </tr>

      <tr *ngIf="!hasData">
        <td class="empty-row" [attr.colspan]="columns.length + (showActions && showAllActions ? 1 : 0)">
          Nenhum registro encontrado para os filtros informados.
        </td>
      </tr>
    </tbody>
  </table>

  <nav *ngIf="hasData">
    <ul>
      <li>
        <button
          class="button-step"
          (click)="prevPage()"
          [disabled]="currentPage === 1"
        >
          <i class="bi bi-caret-left-fill"></i>
        </button>
      </li>

      <li *ngFor="let page of visiblePages">
        <button
          *ngIf="page !== -1"
          (click)="changePage(page)"
          [class.active]="page === currentPage"
        >
          {{ page }}
        </button>
        <span *ngIf="page === -1">...</span>
      </li>

      <li>
        <button
          (click)="nextPage()"
          [disabled]="currentPage === totalPages || totalPages === 0"
          class="button-step"
        >
          <i class="bi bi-caret-right-fill"></i>
        </button>
      </li>
    </ul>
  </nav>
</div>
