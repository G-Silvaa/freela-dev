<div class="app-shell">
  <aside class="sidebar" [class.sidebar-open]="isActiveBar">
    <a class="brand" [routerLink]="['/home']" (click)="closeSidenav()">
      <div class="brand-mark">
        <i class="bi bi-grid-1x2-fill"></i>
      </div>

      <div class="brand-copy">
        <span class="eyebrow brand-eyebrow">Painel</span>
        <strong>Operação previdenciária</strong>
        <p>Clientes, processos, contratos e financeiro em um fluxo direto.</p>
      </div>
    </a>

    <nav class="navigation">
      <a
        *ngFor="let item of navigationItems"
        class="navigation-link"
        [routerLink]="[item.route]"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: isExactRoute(item.route) }"
        (click)="closeSidenav()"
      >
        <span class="icon-shell">
          <i class="bi" [ngClass]="item.icon"></i>
        </span>

        <span class="navigation-copy">
          <strong>{{ item.label }}</strong>
          <small>{{ item.description }}</small>
        </span>
      </a>
    </nav>
  </aside>

  <div class="sidebar-backdrop" [class.visible]="isActiveBar" (click)="closeSidenav()"></div>

  <main class="content">
    <header class="topbar surface-card">
      <div class="topbar-leading">
        <button class="menu-button" type="button" (click)="toggleSideBar()">
          <i class="bi" [ngClass]="isActiveBar ? 'bi-x-lg' : 'bi-list'"></i>
        </button>

        <div class="topbar-copy">
          <span class="eyebrow">{{ currentPage.eyebrow }}</span>
          <h1>{{ currentPage.title }}</h1>
          <p>{{ currentPage.description }}</p>
        </div>
      </div>

      <div class="topbar-meta">
        <span class="meta-pill">
          <i class="bi bi-calendar3"></i>
          {{ todayLabel }}
        </span>
        <span class="meta-pill emphasis">
          <i class="bi bi-activity"></i>
          carteira ativa
        </span>
      </div>
    </header>

    <section class="page-content">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
